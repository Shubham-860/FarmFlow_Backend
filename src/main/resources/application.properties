spring.application.name=FarmFlow_Backend
# Use env vars in production; defaults keep local development simple.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/farmflow_backend?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:8600}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=${PORT:8080}

# Reduce Hibernate query plan cache (big memory hog)
spring.jpa.properties.hibernate.query.plan_cache_max_size=64
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=32

# Reduce connection pool size
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# Lazy initialization - don't load everything on startup
spring.main.lazy-initialization=true


