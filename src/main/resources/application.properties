spring.application.name=FarmFlow_Backend
# Use env vars in production; defaults keep local development simple.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/farmflow_backend?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:8600}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=${PORT:8080}




